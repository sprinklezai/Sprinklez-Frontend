name: Deploy to Hostinger VPS

# Runs automatically every time you push to main.
# Requires 3 repo secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST      - your VPS IP or domain
#   VPS_USER      - ssh username (often "root")
#   VPS_SSH_KEY   - private key contents that matches a public key
#                   already added to ~/.ssh/authorized_keys on the VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/sales-dashboard
            bash deploy/deploy.sh
