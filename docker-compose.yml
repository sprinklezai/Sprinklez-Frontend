version: '3.8'

services:
  # Python FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=https://aontozgncbcdtsygwmny.supabase.co
      - SUPABASE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvbnRvemduY2JjZHRzeWd3bW55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5OTE4MDUsImV4cCI6MjA5ODU2NzgwNX0.jouo3rk8_mrcvwx5tlLRECOL0HnvpzLHWxm-xt1-VDk
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
